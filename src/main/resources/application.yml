spring:
  application:
    name: spring-ai-litellm
  ai:
    openai:
      # Point Spring AI's OpenAI client at the local LiteLLM proxy instead of api.openai.com.
      # LiteLLM is OpenAI-compatible, so no other code changes are needed.
      base-url: ${LITELLM_BASE_URL:http://localhost:4000}
      # This is the LiteLLM master/virtual key, NOT a real OpenAI key.
      api-key: ${LITELLM_API_KEY:sk-1234}
      chat:
        options:
          # Must match a model name defined in litellm-config.yaml (model_list[].model_name).
          model: ${LITELLM_MODEL:claude-sonnet-4-6}
          temperature: 0.7

logging:
  level:
    org.springframework.ai: INFO
