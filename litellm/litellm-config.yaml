litellm_settings:
  modify_params: true

model_list:
  # Claude Sonnet 4.6 (Bedrock)
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: bedrock/global.anthropic.claude-sonnet-4-6
      aws_region_name: ap-northeast-1

  # Claude Opus 4.6 (Bedrock)
  - model_name: claude-opus-4-6
    litellm_params:
      model: bedrock/global.anthropic.claude-opus-4-6-v1
      aws_region_name: ap-northeast-1

  # Claude Opus 4.7 (Bedrock)
  - model_name: claude-opus-4-7
    litellm_params:
      model: bedrock/global.anthropic.claude-opus-4-7
      aws_region_name: ap-northeast-1
      thinking:
        type: "adaptive"
      output_config:
        effort: "xhigh"

  # Claude Opus 4.8 (Bedrock)
  - model_name: claude-opus-4-8
    litellm_params:
      model: bedrock/global.anthropic.claude-opus-4-8
      aws_region_name: ap-northeast-1
      thinking:
        type: "adaptive"
      output_config:
        effort: "xhigh"

general_settings:
  always_include_stream_usage: true
  master_key: sk-u38294
  database_url: "postgresql://postgres:passw0rd@hostname:5432/litellm"
  store_model_in_db: true
  store_prompts_in_spend_logs: false

# ── AWS Bedrock 认证方式说明 ───────────────────────────────────────────────────
#
# 方式 1：AK/SK（IAM 用户凭证）
# 在 litellm_params 里显式引用环境变量，启动前 export：
#
#   export AWS_ACCESS_KEY_ID=AKIA...
#   export AWS_SECRET_ACCESS_KEY=your-secret-key
#
# litellm_params 写法：
#   aws_access_key_id: os.environ/AWS_ACCESS_KEY_ID
#   aws_secret_access_key: os.environ/AWS_SECRET_ACCESS_KEY
#   aws_region_name: ap-northeast-1
#
# 也可以不写 aws_access_key_id / aws_secret_access_key，让 LiteLLM 自动走
# boto3 凭证链（~/.aws/credentials、EC2 实例角色、环境变量等）。
# ⚠️ 不要在 litellm_params 里加 api_key 字段，否则认证会静默失败。
#
# ─────────────────────────────────────────────────────────────────────────────
#
# 方式 2：Bedrock API Key（Bearer Token，2025年7月起支持）
# 在 AWS 控制台 Amazon Bedrock → API keys 页面生成，无需 IAM 用户，
# 适合本地开发快速上手，有效期最长 12 小时（短期）或长期。
#
#   export AWS_BEARER_TOKEN_BEDROCK=your-bedrock-api-key
#
# litellm_params 写法：
#   aws_bedrock_api_key: os.environ/AWS_BEARER_TOKEN_BEDROCK
#   aws_region_name: ap-northeast-1
#
# 示例（注释掉，按需启用）：
#
# - model_name: claude-sonnet-bedrock-apikey
#   litellm_params:
#     model: bedrock/anthropic.claude-3-5-sonnet-20241022-v2:0
#     aws_region_name: ap-northeast-1
#     aws_bedrock_api_key: os.environ/AWS_BEARER_TOKEN_BEDROCK
